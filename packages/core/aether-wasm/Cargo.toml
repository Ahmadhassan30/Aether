[package]
name = "aether-wasm"
version = "0.1.0"
edition = "2021"
description = "WebAssembly boundary bindings for Aether compiler and VM"
license = "GPL-2.0"

[lib]
crate-type = ["cdylib", "rlib"]
path = "src/lib.rs"

[dependencies]
wasm-bindgen = "0.2"
serde = { version = "1.0", features = ["derive"] }
serde-wasm-bindgen = "0.6"
aether-parser = { path = "../aether-parser" }
aether-vm = { path = "../aether-vm" }
aether-codegen = { path = "../aether-codegen" }

[package.metadata.wasm-pack.profile.release]
wasm-opt = false
