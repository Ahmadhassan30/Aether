[package]
name = "aether-codegen"
version = "0.11.0"
edition = "2018"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html
[lib]
path = "lib.rs"

[dependencies]
cranelift-frontend = { version = "0.66", default-features = false, features = ["std"] }
cranelift-module = { version = "0.66", default-features = false }
cranelift-object = { version = "0.66", default-features = false }
cranelift-simplejit = { version = "0.66", optional = true, default-features = false }
cranelift-codegen = { version = "0.66", default-features = false, features = ["std", "x86", "arm64"] }
target-lexicon = "0.10"

lazy_static = "1"

aether-parser = { path = "../aether-parser", features = ["codegen"] }

[features]
jit = ["cranelift-simplejit", "aether-parser/jit"]
